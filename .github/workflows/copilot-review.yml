name: Trigger Copilot Code Review Globally

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'

permissions:
  pull-requests: write
  contents: read

jobs:
  request-copilot-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    
    steps:
      - name: Request Review via GraphQL Bot Injection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.event.repository.owner.login }}
        run: |
          echo "Fetching unique GraphQL Node ID for PR #$PR_NUMBER..."
          
          # 1. Fetch the raw internal node ID of the Pull Request
          PR_NODE_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) {
                  id
                }
              }
            }
          ' -F owner="$REPO_OWNER" -F repo="$REPO_NAME" -F number=$PR_NUMBER --jq '.data.repository.pullRequest.id')

          echo "Found Node ID: $PR_NODE_ID. Injecting Copilot Review Bot..."

          # 2. Force-assign Copilot using its canonical system Bot Node ID (BOT_kgDOCnlnWA)
          gh api graphql -f query='
            mutation($prId: ID!, $botIds: [ID!]!) {
              requestReviews(input: { pullRequestId: $prId, botIds: $botIds }) {
                pullRequest {
                  id
                }
              }
            }
          ' -F prId="$PR_NODE_ID" -X POST -f botIds[]="BOT_kgDOCnlnWA"

          echo "Copilot Code Review bot successfully assigned to non-default branch PR."

